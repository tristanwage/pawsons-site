<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWSONS — Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
    --cream:#F5F3EE;
    --off-white:#FAFAF8;
    --warm-grey:#E8E6E0;
    --olive:#B8B5A8;
    --charcoal:#3A3A38;
    --deep-charcoal:#2A2A28;
    --font-serif:'Cormorant Garamond', serif;
    --font-sans:'Inter', sans-serif;
}

body {
    font-family:var(--font-sans);
    color:var(--charcoal);
    background:var(--off-white);
}

.coming-soon {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2rem;
}

.logo {
    font-family:var(--font-serif);
    letter-spacing:0.2em;
    margin-bottom:2rem;
}

.cta-primary {
    padding:1.2rem 3rem;
    background:var(--charcoal);
    color:var(--off-white);
    border:1px solid var(--charcoal);
    cursor:pointer;
    margin-top:2rem;
}

.modal {
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.6);
}

.modal.active { display:flex; }

.modal-box {
    background:var(--off-white);
    padding:3rem;
    width:90%;
    max-width:400px;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    border:1px solid var(--olive);
    margin-bottom:1rem;
}

button.submit {
    width:100%;
    padding:1rem;
    background:var(--charcoal);
    color:white;
    border:1px solid var(--charcoal);
}

</style>
</head>

<body>

<div class="coming-soon">
    <div>
        <div class="logo">PAWSONS</div>
        <h1>Coming Soon</h1>
        <p>luxury fragrance for dogs, redefined</p>

        <button class="cta-primary" onclick="openModal()">JOIN WAITLIST</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <button onclick="closeModal()">×</button>

        <div id="formWrap">
            <h2>Join the waitlist</h2>
            <form id="form">
                <input type="email" id="email" placeholder="your@email.com" required>
                <button class="submit">SUBMIT</button>
            </form>
        </div>

        <div id="success" style="display:none;">
            <h2>You're on the list.</h2>
        </div>
    </div>
</div>

<script>
const KLAVIYO_LIST_ID = 'QZsArd';
const KLAVIYO_PUBLIC_API_KEY = 'Uq6dZQ';

function openModal() {
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();

    const email = document.getElementById('email').value;

    const payload = {
        data: {
            type: 'subscription',
            attributes: {
                profile: {
                    data: {
                        type: 'profile',
                        attributes: {
                            email: email,
                            subscriptions: {
                                email: {
                                    marketing: {
                                        consent: 'SUBSCRIBED'
                                    }
                                }
                            }
                        }
                    }
                }
            },
            relationships: {
                list: {
                    data: {
                        type: 'list',
                        id: KLAVIYO_LIST_ID
                    }
                }
            }
        }
    };

    try {
        const res = await fetch(
            `https://a.klaviyo.com/client/subscriptions/?company_id=${KLAVIYO_PUBLIC_API_KEY}`,
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json',
                    'revision':'2025-01-15'
                },
                body:JSON.stringify(payload)
            }
        );

        if(res.status === 202 || res.ok){
            document.getElementById('formWrap').style.display='none';
            document.getElementById('success').style.display='block';
        } else {
            console.log(await res.text());
            alert('error');
        }

    } catch(err){
        console.error(err);
        alert('error');
    }
});
</script>

</body>
</html>
